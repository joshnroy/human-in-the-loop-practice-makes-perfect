repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.3.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, numpy, gymnasium]
  - repo: local
    hooks:
      - id: import-linter
        name: import-linter
        description: Enforces pyproject.toml's [tool.importlinter] dependency-direction contracts.
        entry: lint-imports
        language: system
        pass_filenames: false
